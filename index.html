<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Specs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://rawiic.github.io">
</head>
<body>
    <div id="sidebar-overlay" class="modal-overlay" style="z-index:99;">
        <div id="sidebarOverlayBg" style="position:absolute;inset:0;"></div>
    </div>

    <aside>
        <div class="sidebar-header">
            <span class="dot"></span> ThinkPad Specs
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-label">导航</div>
            <button class="sidebar-item active" id="sidebarHome" onclick="showHome()">
                <span class="item-icon">🏠</span>
                <span class="item-label">主页</span>
            </button>
            <button class="sidebar-item" id="sidebarCompare" onclick="openCompareSelectModal()">
                <span class="item-icon">📊</span>
                <span class="item-label">型号对比</span>
            </button>
            <button class="sidebar-item" id="sidebarFavorites" onclick="openFavoritesPage()">
                <span class="item-icon">★</span>
                <span class="item-label">我的收藏</span>
                <span class="item-badge" id="favCount">0</span>
            </button>
        </div>
        <div class="sidebar-divider"></div>
        <!-- 选择型号（筛选 + 搜索 + 列表合并） -->
        <div class="sidebar-section nav-section">
            <div class="sidebar-section-label filter-collapse-header" id="filterCollapseHeader">
                <span>选择型号</span>
                <span class="model-count-badge" id="modelCount">0</span>
                <span class="filter-collapse-summary" id="filterSummary">系列 · 全部</span>
                <span class="filter-collapse-arrow">▼</span>
            </div>
            <div class="filter-collapse-body" id="filterCollapseBody">
                <div style="padding: 4px 16px;">
                    <div class="filter-row">
                        <button id="filterFamilyBtn" class="sidebar-footer-btn filter-active">按系列</button>
                        <button id="filterGenBtn" class="sidebar-footer-btn">按代数</button>
                    </div>
                    <select id="familySelect" class="filter-select"><option value="">全部系列</option></select>
                    <select id="generationSelect" class="filter-select" style="display:none;"><option value="">全部代数</option></select>
                    <input type="text" id="sidebarSearchInput" class="filter-select" placeholder="搜索型号..." style="margin-top:6px;">
                    <button id="resetFilterBtn" class="sidebar-footer-btn" style="width:100%;justify-content:center;margin-top:4px;">重置筛选</button>
                </div>
            </div>
            <div id="modelMenu"></div>
        </div>
            <div class="sidebar-footer">
            <button id="themeToggleSidebar" class="sidebar-footer-btn" title="切换主题">🌙</button>
            <a class="sidebar-footer-btn" href="generator.html" target="_blank" rel="noopener">🛠️</a>
            <a class="sidebar-footer-btn" href="index_old.html" target="_blank" rel="noopener">🤔</a>
        </div>
    </aside>

    <main>
        <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>

        <!-- 型号详情页 -->
        <div id="detailPage" class="detail-page">
            <div id="specDisplay">
                <div style="text-align:center;padding-top:80px;color:var(--text-muted);">
                    <div style="font-size:40px;margin-bottom:16px;">💻</div>
                    <div style="font-size:18px;font-weight:600;">请从左侧选择型号</div>
                </div>
            </div>
        </div>

        <!-- 对比页 -->
        <div id="comparePage" class="compare-page">
            <div class="page-title">型号对比</div>
            <div class="page-subtitle">选择要对比的型号，最多建议 5 个</div>
            <div class="compare-toolbar">
                <input type="text" id="comparePageSearch" class="search-input" placeholder="搜索型号...">
                <button class="btn" id="clearComparePageBtn">清空选择</button>
                <button class="btn btn-accent" id="runCompareBtn">开始对比</button>
            </div>
            <div id="comparePageGrid" class="compare-grid"></div>
            <div id="comparePageResult" class="compare-result-area"></div>
        </div>

        <!-- 收藏页 -->
        <div id="favoritesPage" class="compare-page">
            <div class="page-title">我的收藏</div>
            <div class="page-subtitle" id="favoritesPageSubtitle">已收藏 0 个型号</div>
            <div id="favoritesPageGrid" class="favorites-grid"></div>
        </div>
    </main>

    <!-- FRU 模态框 -->
    <div id="fruModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">可能使用的 FRU <button class="modal-close" onclick="closeFruModal()">×</button></div>
            <div class="modal-body" id="fruModalBody">加载中...</div>
        </div>
    </div>

    <!-- 搜索模态框 -->
    <div id="searchModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">搜索型号 <button class="modal-close" onclick="closeSearchModal()">×</button></div>
            <div class="modal-body">
                <input type="text" id="searchModalInput" class="search-input" placeholder="输入型号名称..." autocomplete="off">
                <div id="searchModalResults"></div>
            </div>
        </div>
    </div>

    <!-- 对比选择模态框（保留向后兼容） -->
    <div id="compareSelectModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">选择对比型号 <button class="modal-close" onclick="closeCompareSelectModal()">×</button></div>
            <div class="modal-body">
                <input type="text" id="compareSearchInput" class="search-input" placeholder="搜索型号..." autocomplete="off">
                <div id="compareSelectList" style="max-height:300px;overflow-y:auto;"></div>
                <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
                    <button class="btn" onclick="clearSelectedModels()">清空选择</button>
                    <button class="btn btn-accent" id="confirmCompareBtn">确认对比</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 对比结果模态框（保留向后兼容） -->
    <div id="compareModal" class="modal-overlay">
        <div class="modal-box wide">
            <div class="modal-header">型号对比 <button class="modal-close" onclick="closeCompareModal()">×</button></div>
            <div class="modal-body" id="compareModalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
